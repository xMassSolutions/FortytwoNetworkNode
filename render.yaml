services:
  - type: web
    name: fortytwo-network-node-analysis
    runtime: docker
    rootDir: server
    dockerfilePath: ./Dockerfile
    region: virginia
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: AGENT_TOKEN
        sync: false
      - key: WALLET
        sync: false
      - key: FOR_CONTRACT
        value: 0xf6B888f442277F01294F94D555608A2E8Bc86430
      - key: MONAD_RPC_URL
        value: https://testnet-rpc.monad.xyz/
      # Optional. When set, the bot persists daily totals and per-hour
      # rounds history to Postgres (e.g. a free Neon project) so the
      # dashboard chart survives Render cold starts. Without it the bot
      # falls back to SQLite at /tmp -- ephemeral on the free tier.
      - key: DATABASE_URL
        sync: false
      # Optional dashboard auth -- when both DASHBOARD_USER and
      # DASHBOARD_PASS_HASH are set, the dashboard requires a login.
      # DASHBOARD_PASS_HASH is a bcrypt hash; generate locally with
      #   python3 -c "import bcrypt,getpass; \
      #     print(bcrypt.hashpw(getpass.getpass().encode(), bcrypt.gensalt()).decode())"
      - key: DASHBOARD_USER
        sync: false
      - key: DASHBOARD_PASS_HASH
        sync: false
      # Optional. Long random string used to sign session cookies. If
      # unset, regenerated each boot (logs everyone out on redeploy).
      - key: SESSION_SECRET
        sync: false
